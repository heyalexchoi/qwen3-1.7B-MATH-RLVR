# SFT Training Configuration — Qwen3-1.7B-Base MATH Distillation

# Model
model_name_or_path: Qwen/Qwen3-1.7B-Base
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# EOS token — REQUIRED for Qwen base models with chat template.
# SFTTrainer saves the base tokenizer (eos=<|endoftext|>) but the model is
# trained to emit <|im_end|> as the chat turn terminator. Without this,
# the saved generation_config won't include <|im_end|> and inference won't
# stop correctly. TRL docs explicitly call this out for Qwen models.
# See: https://huggingface.co/docs/trl/sft_trainer
eos_token: "<|im_end|>"

# Sequence length
# p99 of our trace lengths = ~18.9k tokens; 32k covers 100%
max_seq_length: 32768

# Training
num_train_epochs: 3
per_device_train_batch_size: 1       # A100 80GB — batch=2 OOMs on logits (152k vocab × 32k seq)
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16      # effective batch = 16 (same as before)
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0

# Optimization
bf16: true
gradient_checkpointing: true
optim: adamw_torch

# Logging / checkpointing
logging_steps: 10
eval_steps: 100
save_steps: 500
save_total_limit: 1

# Misc
seed: 42
dataloader_num_workers: 4
